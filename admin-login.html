<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Minha Loja</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <main class="login-wrap">
    <section class="login-card">
      <h1>Login Administrativo</h1>
      <p>Acesse para cadastrar produtos e consultar pedidos.</p>
      <input id="email" placeholder="E-mail" type="email">
      <input id="password" placeholder="Senha" type="password">
      <button id="loginBtn" class="primary" type="button">Entrar</button>
      <small id="loginMsg">Use seu e-mail e senha do Supabase Auth para entrar no painel.</small>
      <a href="index.html">Ir para vitrine pública</a>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="admin.js"></script>
</body>
</html>
